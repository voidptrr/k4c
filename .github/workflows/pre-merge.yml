name: Pre-Merge Checks

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Run flake checks
        run: nix flake check --keep-going
